services:
  namenode:
    image: bde2020/hadoop-namenode:2.0.0-hadoop3.2.1-java8
    container_name: namenode
    restart: always
    ports:
      - "9870:9870"        # HDFS web UI
      - "9000:9000"        # HDFS RPC
    volumes:
      - hadoop_namenode:/hadoop/dfs/name
      - ./data:/data-local # so we can push files into HDFS
    environment:
      - CLUSTER_NAME=taxi
    env_file:
      - ./hadoop.env

  datanode:
    image: bde2020/hadoop-datanode:2.0.0-hadoop3.2.1-java8
    container_name: datanode
    restart: always
    volumes:
      - hadoop_datanode:/hadoop/dfs/data
    environment:
      SERVICE_PRECONDITION: "namenode:9870"
    env_file:
      - ./hadoop.env

  app:
    build: ./app
    container_name: app
    ports:
      - "8501:8501"        # Streamlit
    depends_on:
      - namenode
      - datanode
    env_file:
      - ./hadoop.env

volumes:
  hadoop_namenode:
  hadoop_datanode: